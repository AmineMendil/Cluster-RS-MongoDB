- name: Installation Docker propre et stable
  hosts: mongodb
  become: true

  tasks:

    - name: Mise à jour du cache APT
      apt:
        update_cache: yes

    - name: Installer dépendances système
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Installer Docker (docker.io + containerd)
      apt:
        name:
          - docker.io
          - containerd
        state: present

    - name: Activer containerd
      service:
        name: containerd
        state: started
        enabled: true

    - name: Activer Docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Vérifier Docker (check runtime)
      command: docker info
      changed_when: false

    - name: Installer module Python Docker pour Ansible
      apt:
        name: python3-docker
        state: present