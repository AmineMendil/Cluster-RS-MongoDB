# =============================================================
# PLAYBOOK : Suppression MongoDB Replica Set
# =============================================================
- name: Suppression MongoDB Replica Set
  hosts: mongodb
  become: true

  vars:
    mongo_container: mongo
    data_dir: /opt/mongo-data
    keyfile_dir: /opt/mongo-keyfile

  tasks:

    # =========================
    # STOP & REMOVE CONTAINER
    # =========================
    - name: Arrêter et supprimer container MongoDB
      docker_container:
        name: "{{ mongo_container }}"
        state: absent
        force_kill: true
      ignore_errors: true

    # =========================
    # DELETE DATA
    # =========================
    - name: Supprimer données MongoDB
      file:
        path: "{{ data_dir }}"
        state: absent

    # =========================
    # DELETE KEYFILE
    # =========================
    - name: Supprimer dossier keyfile
      file:
        path: "{{ keyfile_dir }}"
        state: absent

    # =========================
    # OPTIONAL CLEANUP
    # =========================
    - name: Supprimer image MongoDB
      docker_image:
        name: mongo:6
        state: absent
      ignore_errors: true

# =============================================================
# VÉRIFICATION FINALE
# =============================================================
- name: Vérification suppression MongoDB
  hosts: mongodb
  become: true

  tasks:

    # Vérifie que le container n'existe plus
    - name: Vérifier absence du container
      shell: docker ps -a | grep mongo
      register: mongo_check
      failed_when: false
      changed_when: false

    # Affiche le résultat
    - name: Afficher résultat suppression
      debug:
        msg: "MongoDB supprimé avec succès"
      when: mongo_check.stdout == ""